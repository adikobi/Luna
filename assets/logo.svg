<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <style>
        .moon { fill: #F6E05E; }
        .cat { fill: #121212; }
        .cat-stroke {
            stroke: #121212;
            stroke-width: 5;
            fill: none;
            stroke-linecap: round;
        }
    </style>

    <!-- Moon -->
    <path class="moon" d="M50,5 A45,45 0 1 0 50,95 A35,35 0 1 1 50,5 Z" />

    <!-- Cat -->
    <g transform="translate(2, 53)">
        <!-- Tail -->
        <path class="cat-stroke" d="M 10 20 Q 25 -10, 40 20" />
        <!-- Body -->
        <path class="cat" d="M 30 30 C 30 10, 70 10, 70 30 Z" />
        <!-- Head -->
        <circle class="cat" cx="65" cy="12" r="10" />
        <!-- Ears -->
        <path class="cat" d="M 58 6 L 55 -1 L 63 4 Z" />
        <path class="cat" d="M 72 6 L 75 -1 L 67 4 Z" />
    </g>
</svg>
